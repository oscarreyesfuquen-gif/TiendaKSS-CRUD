<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda KSS - Registrar Producto</title>
</head>
<body>
    <h2>🛒 Registrar Nuevo Producto</h2>
    <hr>
    <!-- El action apunta al Servlet que procesará los datos -->
    <form action="ProductoServlet" method="POST">
        <table border="0">
            <tr>
                <td>Nombre del Producto:</td>
                <td><input type="text" name="txtNombre" required></td>
            </tr>
            <tr>
                <td>Precio:</td>
                <td><input type="number" step="0.01" name="txtPrecio" required></td>
            </tr>
            <tr>
                <td>Stock Inicial:</td>
                <td><input type="number" name="txtStock" required></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <button type="submit">Guardar Producto</button>
                    <a href="index.jsp"><button type="button">Volver al Menú</button></a>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
